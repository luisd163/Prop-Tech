<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Panel Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #101823 0%, #1a2332 50%, #243447 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card-home {
            width: min(720px, 92vw);
            background: rgba(26, 35, 50, 0.95);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,.35);
            padding: 32px;
        }
        .accent {
            color: #ff8c42;
        }
    </style>
</head>
<body>
    <div class="card-home">
        <h1 class="mb-2" th:text="${saludo ?: 'Bienvenido(a), cliente'}">Bienvenido(a), cliente</h1>
        <p class="mb-4 text-light-emphasis">Tu registro e ingreso ya están funcionando correctamente.</p>
        <div class="d-flex gap-2">
            <a class="btn btn-warning fw-semibold" th:href="@{/login}">Cerrar sesión</a>
        </div>
    </div>
</body>
</html>
