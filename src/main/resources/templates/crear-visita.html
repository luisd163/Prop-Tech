<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar nueva visita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a1f3d;
            --panel: #132f57;
            --line: rgba(255,255,255,.12);
            --text: #e8eef7;
            --muted: #8aa2c2;
            --gold: #f6c23e;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #203d63 0%, #0a1f3d 55%, #071429 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: grid;
            place-items: center;
            padding: 18px;
        }

        .wrapper {
            width: 100%;
            max-width: 760px;
            background: #102849;
            border: 1px solid #1f416e;
            border-radius: 14px;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid #1f416e;
        }

        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: .86rem;
        }

        .title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .content {
            padding: 16px;
            display: grid;
            gap: 12px;
        }

        .step-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px;
        }

        .step-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: var(--gold);
            font-weight: 600;
            font-size: .9rem;
        }

        .step-index {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid rgba(246, 194, 62, .5);
            display: grid;
            place-items: center;
            font-size: .72rem;
            color: var(--gold);
        }

        label {
            font-size: .78rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .form-control,
        .form-select,
        textarea {
            background: rgba(255,255,255,.07) !important;
            color: var(--text) !important;
            border: 1px solid rgba(246, 194, 62, .32) !important;
        }

        .form-control::placeholder,
        textarea::placeholder {
            color: #7f93b1;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 4px;
        }

        .btn-acento {
            border: 1px solid rgba(246, 194, 62, .45);
            color: #f6c23e;
            background: rgba(246, 194, 62, 0.08);
            border-radius: 8px;
            padding: 8px 14px;
            font-weight: 600;
        }

        .btn-acento:hover {
            color: #1c2635;
            background: #f6c23e;
        }

        .btn-outline-soft {
            border: 1px solid var(--line);
            color: var(--text);
            background: transparent;
            border-radius: 8px;
            padding: 8px 14px;
            font-weight: 600;
        }

        .required {
            color: #ff8d8d;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="topbar">
        <a class="back-link" th:href="@{/visitas}"><i class="bi bi-chevron-left"></i> Mis visitas</a>
        <h1 class="title">Agendar nueva visita</h1>
        <span></span>
    </div>

    <form class="content" th:action="@{/visitas/crear}" method="post">
        <input type="hidden" name="asesorId" th:value="${asesor != null ? asesor.identificacion : ''}">
        <input type="hidden" name="estado" value="PENDIENTE">

        <div class="alert alert-danger py-2 mb-0" th:if="${error != null}" th:text="${error}">
            Error al crear la visita
        </div>

        <section class="step-card">
            <div class="step-head"><span class="step-index">1</span> Seleccionar inmueble</div>
            <label for="inmuebleCodigo">Código de inmueble <span class="required">*</span></label>
            <input id="inmuebleCodigo"
                   name="inmuebleCodigo"
                   class="form-control"
                   type="text"
                   list="inmuebles-codigos"
                     th:value="${inmuebleCodigo}"
                   placeholder="Ingresa el código del inmueble"
                   required>
            <datalist id="inmuebles-codigos">
                <option th:each="inmueble : ${inmuebles}"
                        th:value="${inmueble.codigo}"
                        th:label="${inmueble.nombre + ' · ' + inmueble.direccion}">
                </option>
            </datalist>
        </section>

        <section class="step-card">
            <div class="step-head"><span class="step-index">2</span> Seleccionar cliente</div>
            <label for="clienteId">Código de cliente <span class="required">*</span></label>
            <input id="clienteId"
                   name="clienteId"
                   class="form-control"
                   type="text"
                   list="clientes-codigos"
                     th:value="${clienteId}"
                   placeholder="Ingresa el código del cliente"
                   required>
            <datalist id="clientes-codigos">
                <option th:each="cliente : ${clientes}"
                        th:value="${cliente.identificacion}"
                        th:label="${cliente.nombre + ' · ' + cliente.correo}">
                </option>
            </datalist>
        </section>

        <section class="step-card">
            <div class="step-head"><span class="step-index">3</span> Fecha y hora</div>
            <div class="row g-2">
                <div class="col-md-6">
                    <label for="fecha">Fecha <span class="required">*</span></label>
                    <input id="fecha" name="fecha" type="date" class="form-control" th:value="${fecha}" required>
                </div>
                <div class="col-md-6">
                    <label for="hora">Hora <span class="required">*</span></label>
                    <input id="hora" name="hora" type="text" class="form-control" th:value="${hora}" placeholder="Ej: 10:00 a.m." required>
                </div>
            </div>
        </section>

        <section class="step-card">
            <div class="step-head"><span class="step-index">4</span> Notas adicionales</div>
            <label for="observaciones">Observaciones previas</label>
            <textarea id="observaciones"
                      name="observaciones"
                      rows="3"
                      class="form-control"
                      th:text="${observaciones}"
                      placeholder="Indicaciones de acceso, preferencias del cliente, puntos a destacar del inmueble..."></textarea>
        </section>

        <div class="actions">
            <a class="btn btn-outline-soft" th:href="@{/visitas}">Cancelar</a>
            <button type="submit" class="btn btn-acento">Confirmar visita</button>
        </div>
    </form>
</div>
</body>
</html>
