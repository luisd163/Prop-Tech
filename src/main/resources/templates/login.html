<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prop-Tech - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primario: #1a2332;
            --secundario: #5a6b7d;
            --acento: #ff8c42;
            --fondo: #f5f5f5;
            --blanco: #ffffff;
            --disponible: #2ecc71;
            --no-disponible: #e74c3c;
            --reservado: #f39c12;
            --en-proceso: #3498db;
            --vip: #9b59b6;
            --cancelado: #95a5a6;
        }

        body {
            background: linear-gradient(135deg, rgba(26, 35, 50, 0.85) 0%, rgba(90, 107, 125, 0.85) 100%), url('../img/Edificio-login.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background: rgba(26, 35, 50, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: var(--blanco);
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--acento);
        }

        .login-subtitle {
            color: #b8c8de;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            color: var(--blanco);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid var(--fondo);
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--acento);
            box-shadow: 0 0 0 0.2rem rgba(255, 140, 66, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--secundario);
            opacity: 0.7;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--acento) 0%, #ff7a1f 100%);
            border: none;
            color: var(--blanco);
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 6px;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 140, 66, 0.3);
            color: var(--blanco);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .form-check {
            margin: 20px 0;
        }

        .form-check-input {
            border-color: var(--secundario);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--acento);
            border-color: var(--acento);
        }

        .form-check-input:focus {
            border-color: var(--acento);
            box-shadow: 0 0 0 0.2rem rgba(255, 140, 66, 0.1);
        }

        .form-check-label {
            color: var(--blanco);
            font-size: 14px;
            cursor: pointer;
            margin-left: 8px;
        }

        .form-check-label a {
            color: var(--acento);
            text-decoration: none;
            font-weight: 600;
        }

        .form-check-label a:hover {
            color: #ffb27f;
            text-decoration: underline;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: var(--acento);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #ffb27f;
            text-decoration: underline;
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--fondo);
        }

        .login-footer p {
            color: #b8c8de;
            font-size: 14px;
            margin: 0;
        }

        .login-footer a {
            color: var(--acento);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-footer a:hover {
            color: #ffb27f;
        }

        .error-message {
            background-color: #ffe5e5;
            color: var(--no-disponible);
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid var(--no-disponible);
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background-color: #e5ffe5;
            color: var(--disponible);
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid var(--disponible);
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secundario);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <div class="logo">Prop<span>Tech</span></div>
            <p class="login-subtitle">Gestión de Inmuebles y Operaciones</p>
        </div>

        <!-- Messages -->
        <div class="error-message" id="errorMessage" th:if="${error}">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>
        <div class="success-message" id="successMessage" th:if="${message}">
            <i class="bi bi-check-circle"></i> <span th:text="${message}"></span>
        </div>

        <!-- Form -->
        <form th:action="@{/login}" method="post" class="login-form">
            <!-- Email -->
            <div class="form-group">
                <label for="email" class="form-label">Correo Electrónico</label>
                <div class="input-icon">
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        name="email" 
                        placeholder="ejemplo@correo.com"
                        required>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-icon">
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        name="password" 
                        placeholder="Ingresa tu contraseña"
                        required>
                </div>
            </div>

            <!-- Remember Me -->
            <div class="form-check">
                <input 
                    class="form-check-input" 
                    type="checkbox" 
                    id="rememberMe" 
                    name="rememberMe">
                <label class="form-check-label" for="rememberMe">
                    Recuérdame en este dispositivo
                </label>
            </div>

            <!-- Forgot Password -->
            <div class="forgot-password">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <p>¿No tienes cuenta? <a href="/registro" th:href="@{/registro}">Registrate aquí</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-hide success messages after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            const successMessage = document.getElementById('successMessage');
            if (successMessage && successMessage.classList.contains('show')) {
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 5000);
            }
        });
    </script>
</body>
</html>
